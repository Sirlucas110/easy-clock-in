<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ponto Eletrônico</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; min-height: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #1a2332; }

    .toast { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 50; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.success { background: #16a34a; color: #fff; }
    .toast.error { background: #dc2626; color: #fff; }

    .header { background: #2563eb; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .header svg { width: 24px; height: 24px; color: #fff; }
    .header h1 { font-size: 17px; font-weight: 700; color: #fff; }
    .header p { font-size: 11px; color: rgba(255,255,255,0.7); }

    .content { padding: 16px 20px; }

    .tipo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
    .tipo-btn { padding: 6px 8px; font-size: 11px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; background: #e8ecf1; color: #475569; }
    .tipo-btn.active { background: #2563eb; color: #fff; }

    .main-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; background: #2563eb; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s; margin-bottom: 16px; }
    .main-btn:hover { opacity: 0.9; }
    .main-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .main-btn .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-title { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

    .batida-item { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; }
    .batida-tipo { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .batida-time { font-size: 13px; font-family: monospace; color: #64748b; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-entrada { background: #16a34a; }
    .dot-saida { background: #dc2626; }
    .dot-intervalo { background: #f59e0b; }
    .dot-retorno { background: #2563eb; }

    .empty { text-align: center; padding: 24px 0; color: #94a3b8; font-size: 13px; }
    .empty svg { width: 32px; height: 32px; margin: 0 auto 8px; opacity: 0.4; }

    .skeleton { height: 42px; border-radius: 8px; background: #e2e8f0; margin-bottom: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .footer { text-align: center; font-size: 11px; color: #94a3b8; padding: 8px 0 16px; }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 1.657-1.343 3-3 3s-3-1.343-3-3 1.343-3 3-3 3 1.343 3 3zM18 11c0 1.657-1.343 3-3 3M6 21v-1a4 4 0 014-4h4a4 4 0 014 4v1M12 3v4"/></svg>
    <div>
      <h1>Ponto Eletrônico</h1>
      <p id="date-display"></p>
    </div>
  </div>

  <div class="content">
    <div class="tipo-grid" id="tipo-grid"></div>
    <button class="main-btn" id="bater-btn" onclick="baterPonto()">
      <span>🕐</span> Bater Ponto — Entrada
    </button>
    <div class="section-title">Batidas de hoje</div>
    <div id="batidas-list"></div>
  </div>

  <div class="footer">Extensão Chrome — Ponto Eletrônico v1.0</div>

  <script>
    const BASE_URL = "http://localhost:3000";
    const tipos = [
      { value: "entrada", label: "Entrada" },
      { value: "saida", label: "Saída" },
      { value: "intervalo", label: "Intervalo" },
      { value: "retorno", label: "Retorno" },
    ];
    let currentTipo = "entrada";
    let isLoading = false;

    // Date
    document.getElementById("date-display").textContent =
      new Date().toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" });

    // Tipo selector
    function renderTipos() {
      const grid = document.getElementById("tipo-grid");
      grid.innerHTML = tipos.map(t =>
        `<button class="tipo-btn ${t.value === currentTipo ? 'active' : ''}" onclick="selectTipo('${t.value}')">${t.label}</button>`
      ).join("");
    }

    function selectTipo(tipo) {
      currentTipo = tipo;
      renderTipos();
      const label = tipos.find(t => t.value === tipo)?.label || tipo;
      document.getElementById("bater-btn").innerHTML = `<span>🕐</span> Bater Ponto — ${label}`;
    }

    // Toast
    function showToast(msg, type = "success") {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = `toast ${type} show`;
      setTimeout(() => { el.className = "toast"; }, 3000);
    }

    // Fetch batidas
    async function fetchBatidas() {
      const list = document.getElementById("batidas-list");
      try {
        const res = await fetch(`${BASE_URL}/batidas`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (data.length === 0) {
          list.innerHTML = `<div class="empty"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Nenhuma batida registrada hoje</div>`;
        } else {
          list.innerHTML = data.map(b => {
            const label = tipos.find(t => t.value === b.tipo)?.label || b.tipo;
            const time = new Date(b.timestamp).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
            return `<div class="batida-item"><div class="batida-tipo"><span class="dot dot-${b.tipo}"></span>${label}</div><span class="batida-time">${time}</span></div>`;
          }).join("");
        }
      } catch {
        list.innerHTML = `<div class="empty">Erro ao carregar batidas</div>`;
      }
    }

    // Bater ponto
    async function baterPonto() {
      if (isLoading) return;
      isLoading = true;
      const btn = document.getElementById("bater-btn");
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner"></div> Registrando...`;
      try {
        const res = await fetch(`${BASE_URL}/batidas`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ timestamp: new Date().toISOString(), tipo: currentTipo }),
        });
        if (!res.ok) throw new Error();
        showToast("✅ Ponto registrado com sucesso!");
        await fetchBatidas();
      } catch {
        showToast("❌ Erro ao registrar ponto", "error");
      } finally {
        isLoading = false;
        btn.disabled = false;
        const label = tipos.find(t => t.value === currentTipo)?.label || currentTipo;
        btn.innerHTML = `<span>🕐</span> Bater Ponto — ${label}`;
      }
    }

    renderTipos();
    fetchBatidas();
  </script>
</body>
</html>
